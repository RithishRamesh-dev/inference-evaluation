name: inference-bench

services:
  - name: web
    github:
      repo: RithishRamesh-dev/inference-evaluation
      branch: main
      deploy_on_push: true
    source_dir: /inference-bench
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_size_slug: basic-xs
    instance_count: 1
    build_command: ""
    run_command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envs:
      # MongoDB Atlas connection string (set as SECRET in dashboard)
      - key: MONGODB_URL
        scope: RUN_TIME
        type: SECRET

      - key: MONGODB_DB
        scope: RUN_TIME
        value: inference_bench

      - key: API_KEY
        scope: RUN_TIME
        type: SECRET

      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET

      # Baked into the frontend bundle at build time
      - key: VITE_API_KEY
        scope: BUILD_TIME
        type: SECRET

    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
