version: "3.9"

x-base: &base
  build: .
  env_file: .env
  volumes:
    - ./reports:/reports
    - ./datasets:/eval/datasets   # mount datasets dir — persist downloaded benchmarks

services:

  # Interface + accuracy smoke (~15 min)
  eval:
    <<: *base

  # Interface only
  eval-interface:
    <<: *base
    command: ["--section", "interface"]

  # Full EOS 1000-run test (~30 min)
  eval-eos:
    <<: *base
    command: ["--eos-runs", "1000"]

  # AIME 30 problems + K2VV 12 cases, parallel=5 (~10 min)
  eval-accuracy:
    <<: *base
    command: ["--section", "accuracy", "--aime-direct", "--workers", "5"]

  # All benchmarks — needs download_datasets.sh first (~40 min with parallel=10)
  eval-accuracy-full:
    <<: *base
    command: ["--section", "accuracy", "--aime-direct", "--workers", "10"]

  # Full suite: interface + 1000 EOS + all accuracy
  eval-full:
    <<: *base
    command: ["--eos-runs", "1000", "--aime-direct", "--workers", "5"]