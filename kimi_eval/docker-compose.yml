version: "3.9"

x-base: &base
  build: .
  env_file: .env
  volumes:
    - ./reports:/reports
    - ./outputs:/eval/outputs   # evalscope writes results here

services:

  # Default — interface + accuracy smoke only (~15 min)
  eval:
    <<: *base

  # Interface tests only
  eval-interface:
    <<: *base
    command: ["--section", "interface"]

  # Full EOS 1000-run test (~30 min)
  eval-eos:
    <<: *base
    command: ["--eos-runs", "1000"]

  # Full accuracy via evalscope — 8 parallel requests (~40 min)
  eval-accuracy:
    <<: *base
    command: ["--section", "accuracy", "--aime-direct", "--batch-size", "8"]

  # Faster accuracy — 16 parallel requests (~25 min, may hit rate limits)
  eval-accuracy-fast:
    <<: *base
    command: ["--section", "accuracy", "--aime-direct", "--batch-size", "16"]

  # Quick smoke check with a small sample limit
  eval-accuracy-smoke:
    <<: *base
    command: ["--section", "accuracy", "--aime-direct", "--batch-size", "8", "--limit", "10"]

  # Full suite — interface + 1000 EOS + full accuracy
  eval-full:
    <<: *base
    command: ["--eos-runs", "1000", "--aime-direct", "--batch-size", "8"]